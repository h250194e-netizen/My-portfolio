<body>

    <!-- Consistent Header -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">[Your Name]</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <section id="contact-me" class="page-section">
            <div class="container">

                <!-- Section Title -->
                <h2>Get In Touch</h2>
                
                <!-- Introductory Text -->
                <p class="contact-intro">
                    I'm always open to discussing new projects, creative ideas, or opportunities to be part of your vision. Feel free to reach out.
                </p>

                <!-- Contact Form with proper spacing -->
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>

                <!-- Social Links Section with spacing -->
                <div class="social-links-section">
                    <h3>... or connect with me here</h3>
                    <div class="social-links">
                        <!-- WhatsApp Icon -->
                        <a href="https://wa.me/263783614322" class="social-icon" target="_blank" title="Chat on WhatsApp">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                        <!-- GitHub Icon -->
                        <a href="https://github.com/h250194e-netizen" class="social-icon" target="_blank" title="My GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <!-- LinkedIn Icon -->
                        <a href="https://zw.linkedin.com/in/anesu-zambuko-791bbb395" class="social-icon" target="_blank" title="My LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                        <!-- Email Icon -->
                        <a href="mailto:takundaanesuzambukojnr@gmail.com" class="social-icon" target="_blank" title="Email Me">
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Consistent Footer -->
    <footer>
